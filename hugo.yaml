baseURL: "https://blog-6sm.pages.dev/"
title: "Blog"
theme: PaperMod
copyright: "© 2026"

# 基本构建设置
enableRobotsTXT: true
enableEmoji: true
buildDrafts: false
buildFuture: false
pygmentsUseClasses: true
hasCJKLanguage: true    # 修复中文字数统计和阅读时间

# 分页
pagination:
  pagerSize: 10

# 搜索功能必须（JSON 输出）
outputs:
  home:
    - HTML
    - RSS
    - JSON

# 压缩
minify:
  disableXML: true
  minifyOutput: true

# Sitemap 配置
sitemap:
  changefreq: weekly
  priority: 0.5

# RSS 限制
services:
  rss:
    limit: 30

# === 多语言配置 ===
# 默认中文，英文使用 /en/ 前缀
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: "中文"
    weight: 1
    title: "北海"
    params:
      author: "北海"
      homeInfoParams:
        Title: "你好 👋"
        Content: >
          一个工程师的技术笔记和畅想。
      description: "关于 AI、大语言模型和软件工程的技术博客。"
    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 10
        - identifier: readings
          name: 博览
          url: /readings/
          weight: 15
        - identifier: archives
          name: 归档
          url: /archives/
          weight: 20
        - identifier: search
          name: 搜索
          url: /search/
          weight: 30
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 40
        - identifier: about
          name: 关于
          url: /about/
          weight: 50

  en:
    languageName: "EN"
    weight: 2
    title: "Chunhao Zhang"
    params:
      author: "Chunhao Zhang"
      homeInfoParams:
        Title: "Hi there 👋"
        Content: >
          Tech notes and musings from an engineer.
      description: "A technical blog about AI, LLMs, and software engineering."
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /en/posts/
          weight: 10
        - identifier: readings
          name: Readings
          url: /en/readings/
          weight: 15
        - identifier: archives
          name: Archives
          url: /en/archives/
          weight: 20
        - identifier: search
          name: Search
          url: /en/search/
          weight: 30
        - identifier: tags
          name: Tags
          url: /en/tags/
          weight: 40
        - identifier: about
          name: About
          url: /en/about/
          weight: 50

# === 全局 params ===
params:
  env: production
  mainSections: ["posts", "readings"]

  author: "北海 / Chunhao Zhang"
  images: ["images/og-default.png"]
  DateFormat: "January 2, 2006"

  # 主题切换（亮/暗/跟随系统）
  defaultTheme: auto
  disableThemeToggle: false

  # 文章显示
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  UseHugoToc: true
  showtoc: true
  tocopen: false
  comments: true

  # 社交图标
  socialIcons:
    - name: github
      url: "https://github.com/hahhforest"
    - name: rss
      url: "/index.xml"

  # Favicon
  assets:
    favicon: "/favicon.ico"
    disableHLJS: true

  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 1
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

  # "Raise Issue" 链接
  editPost:
    URL: "https://github.com/hahhforest/blog/issues/new"
    Text: "Raise Issue"
    appendFilePath: false

# === Markup ===
markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: dracula
  goldmark:
    renderer:
      unsafe: true
